<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webinar — Elite Reclutamiento</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0f1117;
  --card:   #1a1d2e;
  --border: #252840;
  --accent: #0073ea;
  --accent2:#784bd1;
  --text:   #e8eaf6;
  --text2:  #6b6f8c;
  --font:   'Plus Jakarta Sans','Inter',system-ui,sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
header {
  width: 100%; padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(15,17,23,.95); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px; }
.logo-text { font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px; }
.logo-text span { color:var(--accent); }
.live-badge { display:flex;align-items:center;gap:6px;background:rgba(226,68,92,.12);border:1px solid rgba(226,68,92,.3);color:#e2445c;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:.5px; }
.live-badge::before { content:'';width:6px;height:6px;background:#e2445c;border-radius:50%;animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* HERO */
.hero { width:100%;max-width:900px;margin:0 auto;padding:32px 20px 0; }
.hero-label { display:inline-flex;align-items:center;gap:6px;background:rgba(0,115,234,.12);border:1px solid rgba(0,115,234,.25);color:var(--accent);font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase; }
.hero-title { font-size:clamp(20px,4vw,30px);font-weight:800;color:#fff;line-height:1.25;margin-bottom:8px; }
.hero-sub { font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6; }

/* PLAYER */
.player-container { width:100%;max-width:900px;margin:0 auto;padding:0 20px 16px; }
.player-wrap {
  position: relative;
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px var(--border);
  background: #000;
  aspect-ratio: 16/9;
}
.player-wrap iframe { position:absolute;inset:0;width:100%;height:100%;border:none; }

/* FAKE PROGRESS BAR */
.fake-progress-wrap { width:100%;max-width:900px;margin:0 auto;padding:0 20px 16px; }
.fake-progress-bg { width:100%;height:4px;background:var(--border);border-radius:99px;overflow:hidden; }
.fake-progress-fill { height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 1s cubic-bezier(.25,.46,.45,.94); }

/* VIEWER BAR */
.viewer-bar { width:100%;max-width:900px;margin:0 auto;padding:0 20px 16px;display:flex;align-items:center;gap:8px; }
.viewer-avatar { width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0; }
.viewer-name { font-size:12.5px;color:var(--text2); }
.viewer-name strong { color:var(--text);font-weight:600; }

/* FOOTER */
footer { margin-top:auto;text-align:center;padding:20px;font-size:11px;color:var(--text2);border-top:1px solid var(--border); }

/* MOBILE */
@media (max-width:600px) {
  header { padding:14px 16px; }
  .hero { padding:20px 16px 0; }
  .player-container { padding:0 0 16px; }
  .player-wrap { border-radius:0;box-shadow:none; }
  .fake-progress-wrap { padding:0 16px 12px; }
  .viewer-bar { padding:0 16px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div class="logo-text">Elite <span>Reclutamiento</span></div>
  </div>
  <div class="live-badge">ON DEMAND</div>
</header>

<div class="hero">
  <div class="hero-label">🎥 Webinar exclusivo</div>
  <h1 class="hero-title">Oportunidad Laboral —<br>Todo lo que necesitas saber</h1>
  <p class="hero-sub">Descubre cómo unirte a nuestro equipo y transformar tu carrera profesional.</p>
</div>

<div class="player-container">
  <div class="player-wrap">
    <div id="yt-player"></div>
  </div>
</div>

<div class="fake-progress-wrap">
  <div class="fake-progress-bg">
    <div class="fake-progress-fill" id="custom-fill"></div>
  </div>
</div>

<div class="viewer-bar" id="viewer-bar" style="display:none">
  <div class="viewer-avatar" id="viewer-avatar">?</div>
  <div class="viewer-name" id="viewer-name"></div>
</div>

<footer>© 2026 Elite Reclutamiento · Todos los derechos reservados</footer>

<script>
const FS_PROJECT = 'elite-reclutamiento-crm';
const FS_KEY     = 'AIzaSyCW2t1oHb7xc2Vi6vJROGRM7E7nu-CbU3s';
const FS_BASE    = `https://firestore.googleapis.com/v1/projects/${FS_PROJECT}/databases/(default)/documents`;

const params  = new URLSearchParams(location.search);
const leadId  = params.get('id');
const nombre  = decodeURIComponent(params.get('nombre') || '');
const correo  = decodeURIComponent(params.get('correo') || '');

if (nombre) {
  document.getElementById('viewer-bar').style.display = 'flex';
  document.getElementById('viewer-avatar').textContent = nombre[0].toUpperCase();
  document.getElementById('viewer-name').innerHTML = `Viendo como: <strong>${nombre}</strong>&nbsp;·&nbsp;${correo}`;
}

let pauseCount  = 0;
let watchedSecs = 0;
let maxPct      = 0;
let lastSave    = 0;
let playing     = false;
let completed   = false;
let sessionStart = new Date().toISOString();
let trackInterval = null;

// Curva agresiva: 10% real → 41% visual, 25% real → 76% visual
function easedPct(real) {
  return (1 - Math.pow(1 - real / 100, 5)) * 100;
}

function updateBar(realPct) {
  document.getElementById('custom-fill').style.width = easedPct(realPct).toFixed(1) + '%';
}

async function saveProgress(final = false) {
  if (!leadId) return;
  const now = Date.now();
  if (!final && now - lastSave < 15000) return;
  lastSave = now;
  const fields = {
    webinar_visto_pct:     { integerValue: String(Math.round(maxPct)) },
    webinar_tiempo_visto:  { integerValue: String(Math.round(watchedSecs)) },
    webinar_pausas:        { integerValue: String(pauseCount) },
    webinar_completado:    { booleanValue: completed },
    webinar_ultima_sesion: { stringValue: sessionStart },
    webinar_ultimo_evento: { stringValue: new Date().toISOString() },
  };
  try {
    const mask = Object.keys(fields).join('&updateMask.fieldPaths=');
    await fetch(`${FS_BASE}/leads/${leadId}?key=${FS_KEY}&updateMask.fieldPaths=${mask}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields }),
      keepalive: true,
    });
  } catch(e) {}
}

// YouTube IFrame API
window.onYouTubeIframeAPIReady = function() {
  new YT.Player('yt-player', {
    videoId: 'rTYiBo0GHdQ',
    playerVars: { rel: 0, modestbranding: 1, showinfo: 0, color: 'white' },
    events: {
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          playing = true;
          if (!trackInterval) {
            trackInterval = setInterval(() => {
              const dur = e.target.getDuration();
              const cur = e.target.getCurrentTime();
              if (dur > 0) {
                const pct = (cur / dur) * 100;
                if (pct > maxPct) maxPct = pct;
                watchedSecs += 1;
                updateBar(maxPct);
                saveProgress();
              }
            }, 1000);
          }
        } else {
          if (playing) pauseCount++;
          playing = false;
          clearInterval(trackInterval);
          trackInterval = null;
          if (e.data === YT.PlayerState.ENDED) {
            completed = true;
            updateBar(100);
          }
          saveProgress(e.data === YT.PlayerState.ENDED);
        }
      }
    }
  });
};

const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.addEventListener('beforeunload', () => saveProgress(true));
</script>
</body>
</html>
